<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indovina il Numero — LINE-DOM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
:root { --acc: #3b82f6; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e0c; color: #e8e0d4; font-family: 'Syne', sans-serif; min-height: 100dvh; display: flex; flex-direction: column; }
header { background: #1c1a17; border-bottom: 2px solid var(--acc); padding: .9rem 1.5rem; display: flex; align-items: center; gap: .75rem; }
h1 { font-size: .95rem; font-weight: 700; }
.badge { margin-left: auto; font-family: 'Syne Mono', monospace; font-size: .5rem; letter-spacing: .3em; text-transform: uppercase; color: rgba(255,255,255,.25); background: rgba(255,255,255,.05); padding: .3rem .7rem; }
main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
.card { background: #1c1a17; border: 1px solid rgba(255,255,255,.07); padding: 2rem; width: 100%; max-width: 360px; }
.card-tag { font-family: 'Syne Mono', monospace; font-size: .5rem; letter-spacing: .4em; text-transform: uppercase; color: var(--acc); margin-bottom: 1.2rem; display: block; }
.msg { font-size: .9rem; color: rgba(255,255,255,.5); min-height: 2.4em; margin-bottom: 1.5rem; line-height: 1.6; }
.input-row { display: flex; gap: .5rem; margin-bottom: .6rem; }
input[type="number"] { flex: 1; background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.1); color: #fff; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; padding: .65rem .9rem; outline: none; -moz-appearance: textfield; }
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
input:focus { border-color: var(--acc); }
.btn { background: none; border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.55); font-family: 'Syne', sans-serif; font-size: .7rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; padding: .65rem 1.1rem; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn:hover { border-color: var(--acc); color: var(--acc); }
.btn.pri { background: var(--acc); border-color: var(--acc); color: #fff; }
.btn.pri:hover { background: #2563eb; border-color: #2563eb; }
.btn.full { display: block; width: 100%; margin-top: .5rem; }
.divider { height: 1px; background: rgba(255,255,255,.06); margin: 1.2rem 0; }
.stats { display: flex; gap: 1.5rem; }
.stat-val { font-family: 'Syne Mono', monospace; font-size: 1.8rem; font-weight: 800; color: var(--acc); line-height: 1; }
.stat-lbl { font-size: .5rem; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.25); margin-top: .3rem; }
.feedback { margin-top: 1rem; font-family: 'Syne Mono', monospace; font-size: .85rem; min-height: 1.4em; color: rgba(255,255,255,.6); }
footer { text-align: center; padding: 1.2rem; font-family: 'Syne Mono', monospace; font-size: .48rem; letter-spacing: .2em; color: rgba(255,255,255,.1); text-transform: uppercase; }
</style>
</head>
<body>

<header>
  <h1>Indovina il Numero</h1>
  <span class="badge">LINE-DOM · zero js</span>
</header>

<main>
  <div class="card">
    <span class="card-tag">Da 1 a 100</span>
    <p class="msg" id="msg">Premi "Nuova partita" per iniziare.</p>
    <div class="input-row">
      <input id="tentativo" type="number" min="1" max="100" placeholder="Il tuo numero…">
      <button class="btn pri" id="btn-prova">Prova →</button>
    </div>
    <button class="btn full" id="btn-nuovo">↺ Nuova partita</button>
    <div class="divider"></div>
    <div class="stats">
      <div>
        <div class="stat-val" id="tnt">—</div>
        <div class="stat-lbl">Tentativi</div>
      </div>
    </div>
    <div class="feedback" id="feedback">&nbsp;</div>
  </div>
</main>

<footer>Costruito con LINE-DOM · Nessuna riga di JavaScript</footer>

<script src="https://qc-17.github.io/LINE/interpreter.js"></script>
<script src="https://qc-17.github.io/LINE/line-dom.js"></script>

<script type="text/line" onclick="btn-nuovo:nuovo,btn-prova:prova">
TAKE rand
TAKE math

FUN r_basso()
  <feedback>TALK ↑ Troppo basso, prova un numero più grande.</feedback>
FEND

FUN r_alto()
  <feedback>TALK ↓ Troppo alto, prova un numero più piccolo.</feedback>
FEND

FUN r_ok()
  <feedback>TALK ✓ Esatto! Vedi i tentativi qui sotto.</feedback>
  <msg>TALK Complimenti! Premi Nuova partita per rigiocare.</msg>
  <ls>segreto = 0</ls>
FEND

FUN nuovo()
  #s = rand_int(1, 100)
  <ls>segreto = @s</ls>
  <ls>tnt = 0</ls>
  <msg>TALK Ho pensato a un numero tra 1 e 100. Inizia a indovinare!</msg>
  <feedback>TALK &nbsp;</feedback>
  <tnt>TALK 0</tnt>
FEND

FUN prova()
  #s = @segreto - 0
  #t = @tentativo - 0
  #n = @tnt - 0
  #n += 1
  <ls>tnt = @n</ls>
  <tnt>TALK @n</tnt>
  IF ok    = #t == #s
  IF basso = #t < #s
  GO @ok @{ r_ok() } & @basso @{ r_basso() } && @{ r_alto() }
FEND
</script>

</body>
</html>
