<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indovina la Parola — LINE-DOM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
:root { --acc: #f43f5e; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e0c; color: #e8e0d4; font-family: 'Syne', sans-serif; min-height: 100dvh; display: flex; flex-direction: column; }
header { background: #1c1a17; border-bottom: 2px solid var(--acc); padding: .9rem 1.5rem; display: flex; align-items: center; gap: .75rem; }
h1 { font-size: .95rem; font-weight: 700; }
.badge { margin-left: auto; font-family: 'Syne Mono', monospace; font-size: .5rem; letter-spacing: .3em; text-transform: uppercase; color: rgba(255,255,255,.25); background: rgba(255,255,255,.05); padding: .3rem .7rem; }
main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
.card { background: #1c1a17; border: 1px solid rgba(255,255,255,.07); padding: 2rem; width: 100%; max-width: 380px; }
.card-tag { font-family: 'Syne Mono', monospace; font-size: .5rem; letter-spacing: .4em; text-transform: uppercase; color: var(--acc); margin-bottom: 1.5rem; display: block; }
.hint-box { background: rgba(255,255,255,.03); border-left: 2px solid var(--acc); padding: .85rem 1rem; margin-bottom: 1.5rem; }
.hint-label { font-size: .5rem; letter-spacing: .3em; text-transform: uppercase; color: rgba(255,255,255,.25); margin-bottom: .35rem; }
.hint-text { font-size: .95rem; color: rgba(255,255,255,.7); line-height: 1.5; min-height: 1.4em; }
.letters { font-family: 'Syne Mono', monospace; font-size: 1.4rem; letter-spacing: .4em; color: rgba(255,255,255,.35); text-align: center; margin-bottom: 1.5rem; min-height: 2rem; }
.input-row { display: flex; gap: .5rem; margin-bottom: .6rem; }
input[type="text"] { flex: 1; background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.1); color: #fff; font-family: 'Syne Mono', monospace; font-size: 1rem; padding: .65rem .9rem; outline: none; text-transform: lowercase; }
input:focus { border-color: var(--acc); }
.btn { background: none; border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.55); font-family: 'Syne', sans-serif; font-size: .7rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; padding: .65rem 1.1rem; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn:hover { border-color: var(--acc); color: var(--acc); }
.btn.pri { background: var(--acc); border-color: var(--acc); color: #fff; }
.btn.pri:hover { background: #e11d48; border-color: #e11d48; }
.btn.full { display: block; width: 100%; margin-top: .5rem; }
.feedback { font-family: 'Syne Mono', monospace; font-size: .85rem; min-height: 1.4em; color: rgba(255,255,255,.55); margin-bottom: 1.2rem; }
.divider { height: 1px; background: rgba(255,255,255,.06); margin: 1rem 0; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; }
.stat { text-align: center; }
.stat-val { font-family: 'Syne Mono', monospace; font-size: 1.5rem; font-weight: 800; color: var(--acc); line-height: 1; }
.stat-lbl { font-size: .48rem; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.22); margin-top: .3rem; }
footer { text-align: center; padding: 1.2rem; font-family: 'Syne Mono', monospace; font-size: .48rem; letter-spacing: .2em; color: rgba(255,255,255,.1); text-transform: uppercase; }
</style>
</head>
<body>

<header>
  <h1>Indovina la Parola</h1>
  <span class="badge">LINE-DOM · zero js</span>
</header>

<main>
  <div class="card">
    <span class="card-tag">Leggi l'indizio e scrivi la parola</span>

    <div class="hint-box">
      <div class="hint-label">Indizio</div>
      <div class="hint-text" id="hint">Premi "Nuova parola" per iniziare.</div>
    </div>

    <div class="letters" id="letters">_ _ _ _ _</div>

    <div class="input-row">
      <input id="guess" type="text" placeholder="La tua risposta…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn pri" id="btn-prova">Prova →</button>
    </div>
    <button class="btn full" id="btn-nuova">↺ Nuova parola</button>

    <div class="feedback" id="feedback">&nbsp;</div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="vinte">0</div>
        <div class="stat-lbl">Indovinate</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="vite">—</div>
        <div class="stat-lbl">Vite rimaste</div>
      </div>
    </div>
  </div>
</main>

<footer>Costruito con LINE-DOM · Nessuna riga di JavaScript</footer>

<script src="https://qc-17.github.io/LINE/interpreter.js"></script>
<script src="https://qc-17.github.io/LINE/line-dom.js"></script>

<script type="text/line" onclick="btn-nuova:nuova,btn-prova:prova">
TAKE rand

>> ── 8 parole con indizi ──
>> Usare GO separati: uno per condizione, esegue solo quello vero

FUN set_gatto()
  <ls>parolasegreta = gatto</ls>
  <hint>TALK Animale domestico che fa le fusa e ama dormire al sole.</hint>
  <letters>TALK _ _ _ _ _</letters>
FEND
FUN set_luna()
  <ls>parolasegreta = luna</ls>
  <hint>TALK Illumina il cielo di notte. Piena, crescente o calante.</hint>
  <letters>TALK _ _ _ _</letters>
FEND
FUN set_mare()
  <ls>parolasegreta = mare</ls>
  <hint>TALK Distesa d'acqua salata con onde, spiagge e pesci.</hint>
  <letters>TALK _ _ _ _</letters>
FEND
FUN set_fuoco()
  <ls>parolasegreta = fuoco</ls>
  <hint>TALK Caldo, luminoso e pericoloso. Brucia tutto ciò che tocca.</hint>
  <letters>TALK _ _ _ _ _</letters>
FEND
FUN set_neve()
  <ls>parolasegreta = neve</ls>
  <hint>TALK Fredda, bianca e silenziosa. Scende in inverno sui monti.</hint>
  <letters>TALK _ _ _ _</letters>
FEND
FUN set_fiore()
  <ls>parolasegreta = fiore</ls>
  <hint>TALK Ha petali colorati e profumati. Sboccia in primavera.</hint>
  <letters>TALK _ _ _ _ _</letters>
FEND
FUN set_vento()
  <ls>parolasegreta = vento</ls>
  <hint>TALK Non si vede, ma muove le foglie, le nuvole e i capelli.</hint>
  <letters>TALK _ _ _ _ _</letters>
FEND
FUN set_pane()
  <ls>parolasegreta = pane</ls>
  <hint>TALK Si fa con la farina e il lievito. È sulla tavola ogni giorno.</hint>
  <letters>TALK _ _ _ _</letters>
FEND

>> ── Selezione parola casuale ──
FUN nuova()
  TAKE rand
  #idx = rand_int(1, 8)
  <ls>vite = 3</ls>
  <ls>parolasegreta = ___</ls>
  <vite>TALK 3</vite>
  <feedback>TALK &nbsp;</feedback>
  IF i1 = #idx == 1
  IF i2 = #idx == 2
  IF i3 = #idx == 3
  IF i4 = #idx == 4
  IF i5 = #idx == 5
  IF i6 = #idx == 6
  IF i7 = #idx == 7
  IF i8 = #idx == 8
  GO @i1 @{ set_gatto() }
  GO @i2 @{ set_luna() }
  GO @i3 @{ set_mare() }
  GO @i4 @{ set_fuoco() }
  GO @i5 @{ set_neve() }
  GO @i6 @{ set_fiore() }
  GO @i7 @{ set_vento() }
  GO @i8 @{ set_pane() }
FEND

>> ── Risposta esatta ──
FUN r_ok()
  #v = @vinte - 0
  #v += 1
  <ls>vinte = @v</ls>
  <vinte>TALK @v</vinte>
  <feedback>TALK ✓ Esatto! Premi Nuova parola per continuare.</feedback>
  <ls>parolasegreta = ___</ls>
FEND

>> ── Game over (vite esaurite) ──
FUN r_fine()
  <feedback>TALK ✗ Vite esaurite. La parola era: @parolasegreta</feedback>
  <ls>parolasegreta = ___</ls>
FEND

>> ── Sbagliato ma con vite ──
FUN r_sbagliato()
  #v = @vite - 0
  #v -= 1
  <ls>vite = @v</ls>
  <vite>TALK @v</vite>
  <feedback>TALK ✗ Sbagliato! Hai ancora @v tentativi.</feedback>
FEND

>> ── Aggiorna vite e mostra risultato ──
FUN aggiorna_vite()
  #v = @vite - 0
  #v -= 1
  <ls>vite = @v</ls>
  <vite>TALK @v</vite>
  IF gameover = #v == 0
  GO @gameover @{ r_fine() } && @{ r_sbagliato() }
FEND

>> ── Verifica tentativo ──
FUN prova()
  IF match = @guess == @parolasegreta
  GO @match @{ r_ok() } && @{ aggiorna_vite() }
FEND
</script>

</body>
</html>
