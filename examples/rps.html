Create rps.html
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sasso Carta Forbice — LINE-DOM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
:root { --acc: #8b5cf6; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e0c; color: #e8e0d4; font-family: 'Syne', sans-serif; min-height: 100dvh; display: flex; flex-direction: column; }
header { background: #1c1a17; border-bottom: 2px solid var(--acc); padding: .9rem 1.5rem; display: flex; align-items: center; gap: .75rem; }
h1 { font-size: .95rem; font-weight: 700; }
.badge { margin-left: auto; font-family: 'Syne Mono', monospace; font-size: .5rem; letter-spacing: .3em; text-transform: uppercase; color: rgba(255,255,255,.25); background: rgba(255,255,255,.05); padding: .3rem .7rem; }
main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
.card { background: #1c1a17; border: 1px solid rgba(255,255,255,.07); padding: 2rem; width: 100%; max-width: 400px; }
.card-tag { font-family: 'Syne Mono', monospace; font-size: .5rem; letter-spacing: .4em; text-transform: uppercase; color: var(--acc); margin-bottom: 1.5rem; display: block; }
.arena { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
.player { text-align: center; }
.player-lbl { font-size: .5rem; letter-spacing: .25em; text-transform: uppercase; color: rgba(255,255,255,.25); margin-bottom: .5rem; }
.player-choice { font-size: 2.4rem; min-height: 2.8rem; line-height: 1; }
.vs { font-family: 'Syne Mono', monospace; font-size: .65rem; color: rgba(255,255,255,.2); letter-spacing: .2em; }
.result { font-size: .95rem; font-weight: 700; min-height: 1.4em; text-align: center; color: rgba(255,255,255,.6); margin-bottom: 1.5rem; }
.choices { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .5rem; margin-bottom: 1rem; }
.btn-choice { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); color: rgba(255,255,255,.6); font-family: 'Syne', sans-serif; font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: .8rem .4rem; cursor: pointer; transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: .3rem; }
.btn-choice span:first-child { font-size: 1.4rem; }
.btn-choice:hover { border-color: var(--acc); color: var(--acc); background: rgba(139,92,246,.07); }
.divider { height: 1px; background: rgba(255,255,255,.06); margin: 1rem 0; }
.scoreboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .5rem; }
.score-cell { text-align: center; }
.score-val { font-family: 'Syne Mono', monospace; font-size: 1.6rem; font-weight: 800; line-height: 1; }
.score-val.v { color: #4ade80; }
.score-val.p { color: #f87171; }
.score-val.d { color: rgba(255,255,255,.3); }
.score-lbl { font-size: .48rem; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.25); margin-top: .3rem; }
.btn-reset { display: block; width: 100%; background: none; border: 1px solid rgba(255,255,255,.08); color: rgba(255,255,255,.25); font-family: 'Syne', sans-serif; font-size: .6rem; letter-spacing: .15em; text-transform: uppercase; padding: .5rem; cursor: pointer; margin-top: .6rem; transition: all .15s; }
.btn-reset:hover { border-color: rgba(255,255,255,.2); color: rgba(255,255,255,.5); }
footer { text-align: center; padding: 1.2rem; font-family: 'Syne Mono', monospace; font-size: .48rem; letter-spacing: .2em; color: rgba(255,255,255,.1); text-transform: uppercase; }
</style>
</head>
<body>

<header>
  <h1>Sasso Carta Forbice</h1>
  <span class="badge">LINE-DOM · zero js</span>
</header>

<main>
  <div class="card">
    <span class="card-tag">Scegli la tua mossa</span>

    <div class="arena">
      <div class="player">
        <div class="player-lbl">Tu</div>
        <div class="player-choice" id="mia">—</div>
      </div>
      <div class="vs">VS</div>
      <div class="player">
        <div class="player-lbl">Computer</div>
        <div class="player-choice" id="pc">—</div>
      </div>
    </div>

    <div class="result" id="res">Scegli una mossa per iniziare.</div>

    <div class="choices">
      <button class="btn-choice" id="btn-s"><span>🪨</span><span>Sasso</span></button>
      <button class="btn-choice" id="btn-c"><span>📄</span><span>Carta</span></button>
      <button class="btn-choice" id="btn-f"><span>✂️</span><span>Forbice</span></button>
    </div>

    <div class="divider"></div>

    <div class="scoreboard">
      <div class="score-cell">
        <div class="score-val v" id="wins">0</div>
        <div class="score-lbl">Vittorie</div>
      </div>
      <div class="score-cell">
        <div class="score-val d" id="draws">0</div>
        <div class="score-lbl">Pareggi</div>
      </div>
      <div class="score-cell">
        <div class="score-val p" id="loses">0</div>
        <div class="score-lbl">Sconfitte</div>
      </div>
    </div>
    <button class="btn-reset" id="btn-reset">↺ Azzera punteggio</button>
  </div>
</main>

<footer>Costruito con LINE-DOM · Nessuna riga di JavaScript</footer>

<script src="https://qc-17.github.io/LINE/interpreter.js"></script>
<script src="https://qc-17.github.io/LINE/line-dom.js"></script>

<script type="text/line" onclick="btn-s:play_s,btn-c:play_c,btn-f:play_f,btn-reset:resetta">
TAKE rand

>> ── Aggiorna punteggio ──

FUN inc_wins()
  #w = @wins - 0
  #w += 1
  <ls>wins = @w</ls>
  <wins>TALK @w</wins>
FEND

FUN inc_loses()
  #l = @loses - 0
  #l += 1
  <ls>loses = @l</ls>
  <loses>TALK @l</loses>
FEND

FUN inc_draws()
  #d = @draws - 0
  #d += 1
  <ls>draws = @d</ls>
  <draws>TALK @d</draws>
FEND

FUN resetta()
  <ls>wins = 0</ls>
  <ls>loses = 0</ls>
  <ls>draws = 0</ls>
  <wins>TALK 0</wins>
  <loses>TALK 0</loses>
  <draws>TALK 0</draws>
  <mia>TALK —</mia>
  <pc>TALK —</pc>
  <res>TALK Scegli una mossa per iniziare.</res>
FEND

>> ── Esiti Sasso ──
FUN s_vince()
  inc_wins()
  <pc>TALK ✂️</pc>
  <res>TALK ✓ Hai vinto! Sasso spezza Forbice.</res>
FEND
FUN s_perde()
  inc_loses()
  <pc>TALK 📄</pc>
  <res>TALK ✗ Hai perso. Carta copre Sasso.</res>
FEND
FUN s_pari()
  inc_draws()
  <pc>TALK 🪨</pc>
  <res>TALK — Pareggio.</res>
FEND

>> ── Esiti Carta ──
FUN c_vince()
  inc_wins()
  <pc>TALK 🪨</pc>
  <res>TALK ✓ Hai vinto! Carta copre Sasso.</res>
FEND
FUN c_perde()
  inc_loses()
  <pc>TALK ✂️</pc>
  <res>TALK ✗ Hai perso. Forbice taglia Carta.</res>
FEND
FUN c_pari()
  inc_draws()
  <pc>TALK 📄</pc>
  <res>TALK — Pareggio.</res>
FEND

>> ── Esiti Forbice ──
FUN f_vince()
  inc_wins()
  <pc>TALK 📄</pc>
  <res>TALK ✓ Hai vinto! Forbice taglia Carta.</res>
FEND
FUN f_perde()
  inc_loses()
  <pc>TALK 🪨</pc>
  <res>TALK ✗ Hai perso. Sasso spezza Forbice.</res>
FEND
FUN f_pari()
  inc_draws()
  <pc>TALK ✂️</pc>
  <res>TALK — Pareggio.</res>
FEND

>> ── Mosse ──
>> PC: 1=sasso  2=carta  3=forbice

FUN play_s()
  #pc = rand_int(1, 3)
  <mia>TALK 🪨</mia>
  >> sasso: vince vs forbice(3), perde vs carta(2), pari vs sasso(1)
  IF w = #pc == 3
  IF l = #pc == 2
  GO @w @{ s_vince() } & @l @{ s_perde() } && @{ s_pari() }
FEND

FUN play_c()
  #pc = rand_int(1, 3)
  <mia>TALK 📄</mia>
  >> carta: vince vs sasso(1), perde vs forbice(3), pari vs carta(2)
  IF w = #pc == 1
  IF l = #pc == 3
  GO @w @{ c_vince() } & @l @{ c_perde() } && @{ c_pari() }
FEND

FUN play_f()
  #pc = rand_int(1, 3)
  <mia>TALK ✂️</mia>
  >> forbice: vince vs carta(2), perde vs sasso(1), pari vs forbice(3)
  IF w = #pc == 2
  IF l = #pc == 1
  GO @w @{ f_vince() } & @l @{ f_perde() } && @{ f_pari() }
FEND
</script>

</body>
</html>
