<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShazamScore Â· Indice di Fama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080f;
      --surface: #0d0d1a;
      --surface2: #111124;
      --border: #1c1c38;
      --border-bright: #2a2a55;
      --gold: #d4a84b;
      --gold-glow: rgba(212, 168, 75, 0.15);
      --gold-dim: rgba(212, 168, 75, 0.08);
      --blue: #4499cc;
      --blue-glow: rgba(68, 153, 204, 0.15);
      --text: #dde0f5;
      --text-dim: #9090b5;
      --muted: #5a5a80;
      --green: #4cc98a;
      --red: #c94466;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Syne', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
      background-image:
        linear-gradient(rgba(212, 168, 75, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212, 168, 75, 0.035) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .container { max-width: 740px; margin: 0 auto; padding: 0 20px 80px; }

    /* â”€â”€ HEADER â”€â”€ */
    header {
      padding: 32px 0 28px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .logo { display: flex; align-items: baseline; gap: 12px; }
    .logo-mark {
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--gold);
    }
    .logo-hex { opacity: 0.7; }
    .logo-sub {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
    }
    .header-pill {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gold);
      border: 1px solid var(--gold-glow); background: var(--gold-dim);
      padding: 4px 12px; border-radius: 20px; letter-spacing: 1px;
    }

    /* â”€â”€ API SECTION â”€â”€ */
    .api-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 18px; overflow: hidden;
    }
    .api-header {
      padding: 13px 18px; display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none; transition: background 0.2s;
    }
    .api-header:hover { background: var(--surface2); }
    .api-title {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: var(--text-dim); display: flex; align-items: center; gap: 10px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0;
    }
    .status-dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .api-chevron { color: var(--muted); transition: transform 0.2s; }
    .api-chevron.open { transform: rotate(180deg); }
    .api-body { padding: 0 18px 18px; display: none; }
    .api-body.open { display: block; }
    .api-note {
      font-size: 12px; color: var(--text-dim); margin-bottom: 12px; line-height: 1.7;
    }
    .api-note a { color: var(--gold); text-decoration: none; }
    .api-note a:hover { text-decoration: underline; }
    .api-row { display: flex; gap: 10px; }

    /* â”€â”€ INPUTS â”€â”€ */
    .input-field {
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      background: var(--bg); border: 1px solid var(--border-bright);
      color: var(--text); padding: 9px 14px; border-radius: 5px;
      outline: none; width: 100%; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }
    .input-field::placeholder { color: var(--muted); }

    /* â”€â”€ BUTTONS â”€â”€ */
    .btn {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
      padding: 9px 18px; border: none; border-radius: 5px;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .btn-gold { background: var(--gold); color: #08080f; }
    .btn-gold:hover { background: #e8bb5a; box-shadow: 0 0 14px var(--gold-glow); }
    .btn-ghost {
      background: transparent; color: var(--text-dim);
      border: 1px solid var(--border-bright);
    }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

    /* â”€â”€ SEARCH â”€â”€ */
    .search-wrap { position: relative; margin-bottom: 18px; }
    .search-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%); color: var(--muted); pointer-events: none;
    }
    .search-field {
      font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 600;
      background: var(--surface); border: 1px solid var(--border-bright);
      color: var(--text); padding: 15px 50px; border-radius: 8px;
      outline: none; width: 100%; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-field:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }
    .search-field::placeholder { color: var(--muted); font-weight: 400; font-size: 15px; }
    .search-spinner {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%); display: none;
    }
    .search-spinner.on { display: block; }
    .spin {
      width: 18px; height: 18px; border: 2px solid var(--border-bright);
      border-top-color: var(--gold); border-radius: 50%;
      animation: rotate 0.7s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }

    /* â”€â”€ RESULTS â”€â”€ */
    .results-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; margin-bottom: 20px;
    }
    .result-row {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 18px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background 0.15s;
    }
    .result-row:last-child { border-bottom: none; }
    .result-row:hover { background: var(--surface2); }
    .result-row.active { background: var(--surface2); border-left: 3px solid var(--gold); }
    .result-art {
      width: 48px; height: 48px; border-radius: 5px;
      object-fit: cover; background: var(--border); flex-shrink: 0;
    }
    .result-info { flex: 1; min-width: 0; }
    .result-title {
      font-weight: 700; font-size: 14px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .result-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .result-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--muted); border: 1px solid var(--border-bright);
      padding: 2px 8px; border-radius: 2px; white-space: nowrap;
    }
    .result-arrow { color: var(--muted); font-size: 14px; }
    .no-results { padding: 28px; text-align: center; color: var(--muted); font-size: 13px; }

    /* â”€â”€ ERROR â”€â”€ */
    .err-box {
      background: rgba(201,68,102,0.1); border: 1px solid rgba(201,68,102,0.3);
      border-radius: 6px; padding: 12px 16px; font-size: 13px; color: #f09;
      margin-bottom: 16px; display: none;
    }
    .err-box.on { display: block; }

    /* â”€â”€ ANALYSIS PANEL â”€â”€ */
    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; display: none;
    }
    .panel.on { display: block; animation: rise 0.35s ease; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Song header */
    .song-hd {
      display: flex; align-items: center; gap: 18px;
      padding: 22px 22px 20px;
      background: linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%);
      border-bottom: 1px solid var(--border);
    }
    .song-cover {
      width: 76px; height: 76px; border-radius: 8px;
      object-fit: cover; background: var(--border); flex-shrink: 0;
    }
    .song-info { flex: 1; min-width: 0; }
    .song-title {
      font-size: 21px; font-weight: 800; letter-spacing: -0.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-artist { font-size: 14px; color: var(--text-dim); margin-top: 2px; }
    .song-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .tag {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      padding: 2px 9px; border-radius: 3px; border: 1px solid; letter-spacing: 0.5px;
    }
    .tag-g { color: var(--gold); border-color: var(--gold-glow); background: var(--gold-dim); }
    .tag-b { color: var(--blue); border-color: var(--blue-glow); background: rgba(68,153,204,0.06); }
    .tag-d { color: var(--text-dim); border-color: var(--border-bright); background: transparent; }

    /* Data strip */
    .strip {
      display: grid; grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .strip-cell {
      padding: 14px 22px; border-right: 1px solid var(--border);
    }
    .strip-cell:last-child { border-right: none; }
    .cell-label {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px;
    }
    .cell-val {
      font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 600; color: var(--text);
    }
    .cell-val.g { color: var(--gold); }

    /* Country row */
    .country-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 22px; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .country-label {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap;
    }
    .country-sel {
      font-family: 'Syne', sans-serif; font-size: 13px;
      background: var(--bg); border: 1px solid var(--border-bright);
      color: var(--text); padding: 7px 12px; border-radius: 5px;
      outline: none; cursor: pointer; flex: 1; min-width: 180px;
    }
    .country-sel:focus { border-color: var(--gold); }

    /* Scores grid */
    .scores-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .score-card {
      padding: 28px 20px; display: flex; flex-direction: column;
      align-items: center; gap: 10px; border-right: 1px solid var(--border);
    }
    .score-card:last-child { border-right: none; }
    .score-head {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--muted); text-transform: uppercase; letter-spacing: 2px;
    }
    .score-desc {
      font-size: 12px; color: var(--text-dim); text-align: center;
      max-width: 200px; line-height: 1.55; min-height: 36px;
    }

    /* Breakdown */
    .bk-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px; cursor: pointer; transition: background 0.2s;
    }
    .bk-toggle:hover { background: var(--surface2); }
    .bk-toggle-label {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px;
    }
    .bk-arrow { color: var(--muted); transition: transform 0.2s; font-size: 12px; }
    .bk-toggle.open { border-bottom: 1px solid var(--border); }
    .bk-toggle.open .bk-arrow { transform: rotate(180deg); }
    .bk-body {
      display: none; padding: 18px 22px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
    }
    .bk-body.open { display: block; }
    .bk-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid var(--border);
    }
    .bk-row:last-of-type { border-bottom: none; }
    .bk-k { color: var(--muted); }
    .bk-v { color: var(--text); }
    .bk-v.g { color: var(--gold); }
    .bk-v.b { color: var(--blue); }
    .bk-section {
      margin: 14px 0 6px;
      font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px;
    }
    .progress-track {
      height: 4px; background: var(--border-bright);
      border-radius: 2px; margin: 4px 0 14px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 2px; transition: width 1.4s cubic-bezier(0.16,1,0.3,1);
    }
    .pf-g { background: var(--gold); }
    .pf-b { background: var(--blue); }
    .algo-note {
      margin-top: 14px; font-size: 11px; color: var(--muted); line-height: 1.7;
      border-top: 1px solid var(--border); padding-top: 12px;
    }
    .algo-note strong { color: var(--text-dim); }

    /* â”€â”€ RESPONSIVE â”€â”€ */
    @media (max-width: 500px) {
      .scores-grid { grid-template-columns: 1fr; }
      .score-card:first-child { border-right: none; border-bottom: 1px solid var(--border); }
      .strip { grid-template-columns: 1fr 1fr; }
      .strip-cell:nth-child(3) { grid-column: 1/-1; border-right: none; border-top: 1px solid var(--border); }
      .song-title { font-size: 17px; }
    }
  </style>
</head>

  </div>

// ================================================================
// ALGORITMO â€” Modello storico Shazam
//
// Utenti attivi annuali Shazam (stima, milioni):
//   2002: lancio UK come servizio telefonico â€” ~2M
//   2008: lancio app iPhone â€” esplosione ~45M
//   2012-2018: crescita accelerata, saturazione ~500M
//   2018: acquisita da Apple, ~1 miliardo utenti totali registrati
//   2024: stabile ~450M attivi/anno
//
// ERA FACTOR: normalizza gli shazam per opportunita' storica.
//   Una canzone del 2010 ha avuto 14 anni con base utenti enorme.
//   Una canzone del 1970 poteva essere shazamata solo per "scoperta catalogo"
//   (radio, TV, film) â€” tasso di scoperta molto piu' basso.
// ================================================================

const ANNUAL_USERS = {
  2002:2,  2003:4,   2004:6,   2005:9,   2006:14,
  2007:22, 2008:45,  2009:90,  2010:160,
  2011:230,2012:300, 2013:365, 2014:415,
  2015:450,2016:475, 2017:500, 2018:505,
  2019:505,2020:490, 2021:480, 2022:470,
  2023:460,2024:450
};
const CUR = 2024;
// Somma totale user-years 2002-2024
const TOTAL_UY = Object.values(ANNUAL_USERS).reduce((a,b)=>a+b,0); // ~6447M

/**
 * Esposizione di una canzone: opportunita' totale ponderata di essere shazamata.
 *
 * Per canzoni post-2002: somma utenti * peso_recenza da anno uscita a oggi.
 *   Le canzoni vengono shazamate di piu' nei primi 2 anni (lancio, promozione),
 *   poi decadono come "catalogo" (peso minimo 0.2).
 *
 * Per canzoni pre-2002: non esisteva Shazam durante la vita attiva del brano.
 *   Vengono scoperte solo incidentalmente (radio, TV, spot, film).
 *   Tasso di scoperta catalogo = funzione esponenziale decrescente con l'eta'.
 */
function getExposure(year) {
  if (year >= 2002) {
    let exp = 0;
    for (let y = year; y <= CUR; y++) {
      const u = ANNUAL_USERS[y] || 450;
      const age = y - year;
      // Peso recenza: 1.0 al lancio, decade esponenzialmente, pavimento 0.2
      const w = 0.2 + 0.8 * Math.exp(-0.35 * age);
      exp += u * w;
    }
    return exp;
  } else {
    // Scoperta catalogo: tasso proporzionale all'eta' pre-Shazam
    // Base: ~2.8% di tutti gli user-years per canzoni appena pre-Shazam
    // Decade con l'eta' (canzoni degli anni '50 hanno quasi zero airplay oggi)
    const ybs = 2002 - year; // anni prima di Shazam
    const rate = 0.028 * Math.exp(-0.038 * ybs) + 0.003;
    return TOTAL_UY * rate;
  }
}

/**
 * Era Factor: moltiplicatore per normalizzare gli shazam all'era.
 *
 * Riferimento = canzone uscita nel 2024 (1 anno, discovery attiva, ~450M utenti)
 *
 * Factor > 1 â†’ la canzone aveva MENO opportunita' â†’ stessi shazam = piu' impressionante
 * Factor < 1 â†’ la canzone aveva PIU' opportunita' â†’ servono piu' shazam per impressionare
 *
 * Esempi attesi:
 *   1950: ~10-12x   (era pre-digitale, quasi nessuno la shazama)
 *   1970:  ~6x      (classic rock, rare scoperte casuali)
 *   1990:  ~3x      (pre-Shazam ma piu' in circolazione)
 *   2002:  ~1.7x    (appena entrati nell'era Shazam)
 *   2010:  ~0.3x    (peak opportunity, 14 anni + grande userbase)
 *   2018:  ~0.5x    (recente ma con base gia' ampia)
 *   2024:  1.0x     (riferimento)
 */
function getEraFactor(year) {
  const ref = getExposure(2024);
  const exp = getExposure(year);
  return Math.max(0.05, Math.min(20, ref / exp));
}

/**
 * Base utenti Shazam stimata per paese (milioni).
 *
 * Modello: popolazione Ã— penetrazione_internet Ã— tasso_adozione_globale
 * Tasso globale: ~1.2B utenti Shazam / ~5.5B utenti internet = 22%
 */
function getCountryBase(code) {
  const c = CM[code];
  if (!c) return 20; // default 20M
  return c.p * c.i * 0.22;
}

/**
 * Calcola i due punteggi.
 *
 * WORLD SCORE (0-1000):
 *   75% volume shazam normalizzato per era (legge di Zipf â†’ compressione logaritmica)
 *   25% diffusione geografica (radice quadrata per rendimenti decrescenti)
 *
 * ORIGIN SCORE (0-1000):
 *   Misura la penetrazione relativa nel paese d'origine rispetto alla base utenti locale.
 *   Un artista italiano con 2M shazam mondiali che saturano il mercato italiano
 *   puo' avere un origin score altissimo nonostante un world score modesto.
 *
 *   60% volume shazam normalizzato
 *   40% penetrazione nazionale (rapporto shazam/base-utenti-paese, log-compresso)
 *
 * Era adjustment sull'origin score: le canzoni antiche che circolano ancora
 *   ottengono un boost aggiuntivo sulla componente nazionale.
 */
function calcScores({shazams, year, country, numCountries}) {
  const ef = getEraFactor(year);
  const norm = shazams * ef;

  // Log-compressione: la fama segue distribuzione power-law
  // MAX_LOG = 8 â†’ log10(100M) = 8 â†’ punteggio massimo di volume
  const ML = 8;
  const logS = Math.log10(norm + 1);
  const sComp = Math.min(logS / ML, 1.0);

  // Diffusione geografica
  let gComp = 0.5; // default: spread ignota, assume moderata
  if (numCountries > 0) gComp = Math.sqrt(Math.min(numCountries / 195, 1.0));

  // World score
  const wRaw = 0.75 * sComp + 0.25 * gComp;
  const worldScore = Math.round(Math.min(wRaw, 1) * 1000);

  // Origin score
  let originScore = null, originMeta = null;
  if (country && CM[country]) {
    const cd = CM[country];
    const natBase = getCountryBase(country) * 1e6; // utenti reali

    // Rapporto shazam mondiali / base utenti paese
    // Se shazam > 10 * natBase = saturazione estrema (punteggio massimo)
    const rawRatio = shazams / (natBase * 10);

    // Log-comprimi: log10(ratio*10+1) / log10(11)
    const penComp = Math.min(Math.log10(rawRatio * 10 + 1) / Math.log10(11), 1.0);

    // Amplifica leggermente per canzoni antiche (circolano ancora = molto significative nel paese)
    const eraBoost = Math.min(Math.sqrt(ef), 2.0);
    const penAdj = Math.min(penComp * eraBoost, 1.0);

    const oRaw = 0.60 * sComp + 0.40 * penAdj;
    originScore = Math.round(Math.min(oRaw, 1) * 1000);

    originMeta = {
      natBase: (natBase / 1e6).toFixed(1),
      rawRatio: rawRatio.toFixed(4),
      penComp: (penComp * 100).toFixed(1),
      penAdj: (penAdj * 100).toFixed(1),
      name: cd.n, flag: cd.f,
    };
  }

  return {
    worldScore,
    originScore,
    bd: {
      ef: ef.toFixed(3),
      norm: Math.round(norm),
      sComp: (sComp * 100).toFixed(1),
      gComp: (gComp * 100).toFixed(1),
      originMeta,
    }
  };
}

const HOST = 'shazam.p.rapidapi.com';
const BASE = 'https://shazam.p.rapidapi.com';

function hdrs() {
  return { 'x-rapidapi-host': HOST, 'x-rapidapi-key': localStorage.getItem('sz_key') || '' };
}

async function apiSearch(q) {
  const r = await fetch(`${BASE}/v2/search?term=${encodeURIComponent(q)}&locale=en-US&offset=0&limit=7`,
    { method:'GET', headers: hdrs() });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  // v2 structure: d.tracks.hits[].track  oppure  d.data[].attributes
  if (d.tracks?.hits) return d.tracks.hits.map(h => h.track);
  if (d.data) return d.data.map(item => ({
    key: item.id,
    title: item.attributes?.name,
    subtitle: item.attributes?.artistName,
    images: { coverart: item.attributes?.artwork?.url?.replace('{w}','300').replace('{h}','300') },
    genres: { primary: item.attributes?.genreNames?.[0] },
  }));
  return [];
}

async function apiDetails(id) {
  // Prova prima l'endpoint v2, poi fallback al classico
  try {
    const r = await fetch(`${BASE}/songs/v2/get-details?id=${id}&locale=en-US`,
      { method:'GET', headers: hdrs() });
    if (r.ok) {
      const d = await r.json();
      // normalizza in struttura attesa dal parser
      if (d.data?.[0]) {
        const a = d.data[0].attributes || {};
        return {
          _v2: true,
          title: a.name,
          subtitle: a.artistName,
          images: { coverarthq: a.artwork?.url?.replace('{w}','600').replace('{h}','600') },
          genres: { primary: a.genreNames?.[0] },
          releasedate: a.releaseDate,
          count: a.shazamCount || null,
          sections: d.data[0].relationships ? [] : [],
          _raw: d,
        };
      }
    }
  } catch(_) {}
  // fallback endpoint classico
  const r2 = await fetch(`${BASE}/songs/get-details?key=${id}&locale=en-US`,
    { method:'GET', headers: hdrs() });
  if (!r2.ok) throw new Error(`HTTP ${r2.status}`);
  return await r2.json();
}

// Estrai conteggio shazam dal JSON risposta
function parseCount(d) {
  // v2 API
  if (d._raw?.data?.[0]?.attributes?.shazamCount)
    return d._raw.data[0].attributes.shazamCount;
  if (typeof d.count === 'number' && d.count > 0) return d.count;
  // sezioni metadata classico
  if (d.sections) {
    for (const s of d.sections) {
      if (s.metadata) {
        for (const m of s.metadata) {
          if (m.title?.toLowerCase().includes('shazam')) {
            const n = parseInt(String(m.text).replace(/\D/g,''));
            if (n > 0) return n;
          }
        }
      }
    }
  }
  if (d.hub?.actions) {
    for (const a of d.hub.actions) {
      if (typeof a.count === 'number' && a.count > 0) return a.count;
    }
  }
  // cerca ricorsivamente qualsiasi campo count > 1000
  function findCount(obj, depth) {
    if (depth > 6 || !obj || typeof obj !== 'object') return null;
    for (const k of Object.keys(obj)) {
      if ((k === 'count' || k === 'shazamCount')) {
        const v = parseInt(obj[k]);
        if (v > 1000) return v;
      }
      const r = findCount(obj[k], depth + 1);
      if (r) return r;
    }
    return null;
  }
  return findCount(d, 0);
}

// Estrai anno di uscita
function parseYear(d) {
  if (d.sections) {
    for (const s of d.sections) {
      if (s.metadata) {
        for (const m of s.metadata) {
          const t = m.title?.toLowerCase() || '';
          if (t.includes('release') || t.includes('anno') || t.includes('uscita')) {
            const match = String(m.text||'').match(/(\d{4})/);
            if (match) return parseInt(match[1]);
          }
        }
      }
    }
  }
  if (d.releasedate) {
    const m = String(d.releasedate).match(/(\d{4})/);
    if (m) return parseInt(m[1]);
  }
  return null;
}

const R = 72, CX = 90, CY = 90;
const CIRC = 2 * Math.PI * R; // ~452.4

function gaugeInit(id, color) {
  document.getElementById(id).innerHTML = `
    <circle cx="${CX}" cy="${CY}" r="${R}"
      fill="none" stroke="#1c1c38" stroke-width="10"/>
    <circle class="arc-${id}" cx="${CX}" cy="${CY}" r="${R}"
      fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="0 ${CIRC}"
      transform="rotate(-90 ${CX} ${CY})"
      style="filter:drop-shadow(0 0 8px ${color}70)"/>
    <text class="num-${id}" x="${CX}" y="${CY - 7}"
      text-anchor="middle" dominant-baseline="middle"
      font-family="JetBrains Mono,monospace" font-weight="600" font-size="36"
      fill="#dde0f5">0</text>
    <text x="${CX}" y="${CY + 20}"
      text-anchor="middle" dominant-baseline="middle"
      font-family="Syne,sans-serif" font-size="11" fill="#5a5a80">/ 1000</text>
    <text class="lbl-${id}" x="${CX}" y="${CY + 36}"
      text-anchor="middle"
      font-family="JetBrains Mono,monospace" font-size="10"
      fill="${color}"></text>`;
}

function gaugePlaceholder(id, txt) {
  document.getElementById(id).innerHTML = `
    <circle cx="${CX}" cy="${CY}" r="${R}"
      fill="none" stroke="#1c1c38" stroke-width="10" stroke-dasharray="8 6"/>
    <text x="${CX}" y="${CY}" text-anchor="middle" dominant-baseline="middle"
      font-family="Syne,sans-serif" font-size="12" fill="#5a5a80">${esc(txt)}</text>`;
}

function animGauge(id, target, color) {
  if (_anims[id]) cancelAnimationFrame(_anims[id]);
  const arc = () => document.querySelector(`.arc-${id}`);
  const num = () => document.querySelector(`.num-${id}`);
  const lbl = () => document.querySelector(`.lbl-${id}`);
  const t0 = performance.now(), dur = 1400;

  function step(now) {
    const t = Math.min((now - t0) / dur, 1);
    const e = t === 1 ? 1 : 1 - Math.pow(2, -10 * t); // ease-out-expo
    const cur = Math.round(target * e);
    const fill = (cur / 1000) * CIRC;
    arc()?.setAttribute('stroke-dasharray', `${fill} ${CIRC}`);
    if (num()) num().textContent = cur;
    if (lbl()) lbl().textContent = scoreLabel(cur);
    if (t < 1) _anims[id] = requestAnimationFrame(step);
  }
  _anims[id] = requestAnimationFrame(step);
}

function scoreLabel(s) {
  if (s >= 950) return '\u2605 LEGGENDARIA';
  if (s >= 850) return '\u2605 ICONICA';
  if (s >= 700) return '\u25C8 GLOBALE';
  if (s >= 550) return '\u25C8 POPOLARE';
  if (s >= 400) return '\u25C7 NOTA';
  if (s >= 250) return '\u00B7 EMERGENTE';
  return '\u00B7 LOCALE';
}

function worldDesc(s) {
  if (s >= 950) return 'Patrimonio culturale globale. Riconoscibile in ogni angolo del pianeta.';
  if (s >= 850) return 'Icona internazionale. Parte del repertorio musicale collettivo mondiale.';
  if (s >= 700) return 'Hit mondiale di grande portata con diffusione geografica ampia.';
  if (s >= 550) return 'Canzone popolare con solido riconoscimento internazionale.';
  if (s >= 400) return 'Diffusione significativa oltre i confini del mercato d\'origine.';
  if (s >= 250) return 'Artista emergente o canzone con diffusione ancora prevalentemente locale.';
  return 'Diffusione limitata a mercati specifici o a nicchie di ascolto.';
}

// ================================================================
// HELPERS
// ================================================================
function fmt(n) {
  if (!n && n !== 0) return 'â€”';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
  return String(n);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getEra(y) {
  if (y < 1960) return "pre-'60";
  if (y < 1970) return "anni '60";
  if (y < 1980) return "anni '70";
  if (y < 1990) return "anni '80";
  if (y < 2000) return "anni '90";
  if (y < 2002) return 'pre-Shazam';
  if (y < 2010) return 'era mobile';
  if (y < 2018) return 'era streaming';
  return 'era social';
}

function showErr(msg) {
  const b = document.getElementById('err');
  b.textContent = '\u26A0 ' + msg; b.classList.add('on');
}
function clearErr() { document.getElementById('err').classList.remove('on'); }
