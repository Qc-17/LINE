<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Manutenzione</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f7f7f7;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #333;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        img {
            width: 100%;
            max-width: 300px;
            border-radius: 12px;
        }

        a.button {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
        }

        a.button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ops... stiamo aggiornando il sito.<br>Tornerà presto disponibile.</h1>
        
        <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" alt="GIF imbarazzante">
        
        <br>
        <a class="button" href="https://qc-17.github.io/LINE">Torna alla homepage</a>
    </div>
</body>
</html>
