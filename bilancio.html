<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilancio — LINE-DOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>

/* ── Variabili tema (cambiano con body class) ── */
:root {
  --acc:     #1a1814;
  --acc-dim: rgba(26,24,20,.08);
  --acc-str: rgba(26,24,20,.18);
  --pill-bg: #1a1814;
  --pill-fg: #fff;
}
body.positivo {
  --acc:     #1c6432;
  --acc-dim: rgba(28,100,50,.07);
  --acc-str: rgba(28,100,50,.2);
  --pill-bg: #1c6432;
  --pill-fg: #fff;
}
body.negativo {
  --acc:     #b83515;
  --acc-dim: rgba(184,53,21,.07);
  --acc-str: rgba(184,53,21,.2);
  --pill-bg: #b83515;
  --pill-fg: #fff;
}

/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f4f0e8;
  color: #1a1814;
  font-family: 'Syne', sans-serif;
  min-height: 100dvh;
  transition: --acc .4s;
}

/* ── Header ── */
header {
  background: #1a1814;
  padding: 1.1rem 2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  border-bottom: 3px solid var(--acc);
  transition: border-color .4s;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Syne Mono', monospace;
  font-size: .65rem;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: rgba(255,255,255,.35);
}
header h1 {
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -.01em;
}
.header-badge {
  margin-left: auto;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.3);
  font-family: 'Syne Mono', monospace;
  font-size: .55rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  padding: .3rem .7rem;
}

/* ── Layout ── */
main {
  max-width: 720px;
  margin: 0 auto;
  padding: 3rem 1.5rem 5rem;
}

/* ── Sezione label ── */
.label {
  font-family: 'Syne Mono', monospace;
  font-size: .58rem;
  letter-spacing: .4em;
  text-transform: uppercase;
  color: var(--acc);
  display: block;
  margin-bottom: .7rem;
  transition: color .4s;
}

/* ── Card ── */
.card {
  background: #fff;
  border: 1px solid rgba(0,0,0,.08);
  padding: 1.6rem;
  margin-bottom: 1.2rem;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}

/* ── Input Euro ── */
.field { margin-bottom: 1.1rem; }
.field:last-of-type { margin-bottom: 0; }

.field-label {
  display: block;
  font-size: .62rem;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: #7a7268;
  margin-bottom: .4rem;
}
.input-wrap {
  display: flex;
  align-items: stretch;
  border: 1.5px solid rgba(0,0,0,.12);
  background: #f9f6f0;
  transition: border-color .2s;
}
.input-wrap:focus-within {
  border-color: var(--acc);
}
.input-prefix {
  display: flex;
  align-items: center;
  padding: 0 .9rem;
  font-family: 'Syne Mono', monospace;
  font-size: .8rem;
  color: #a09890;
  background: rgba(0,0,0,.03);
  border-right: 1px solid rgba(0,0,0,.08);
  user-select: none;
}
.input-wrap input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: #1a1814;
  padding: .75rem .9rem;
}
.input-wrap input::placeholder { color: #c0b8b0; font-weight: 400; }

/* ── Griglia spese ── */
.expense-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
@media(max-width:500px) { .expense-grid { grid-template-columns: 1fr; } }

/* ── Bottone ── */
#calcola {
  display: block;
  width: 100%;
  background: #1a1814;
  color: #fff;
  border: none;
  padding: 1.05rem 2rem;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: .85rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 1.4rem;
  transition: background .2s, transform .1s;
}
#calcola:hover  { background: #2d2922; }
#calcola:active { transform: scale(.99); }

/* ── Risultati ── */
.results-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: .8rem;
  margin-bottom: 1.2rem;
}
@media(max-width:500px) { .results-grid { grid-template-columns: 1fr; } }

.res-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,.08);
  padding: 1.3rem 1.1rem;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.res-card.hero {
  background: var(--acc-dim);
  border-color: var(--acc-str);
  transition: background .4s, border-color .4s;
}
.res-card-label {
  display: block;
  font-size: .52rem;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: #9a9088;
  font-weight: 700;
  margin-bottom: .55rem;
}
.res-card-value {
  font-family: 'Syne Mono', monospace;
  font-size: 1.35rem;
  font-weight: 700;
  color: #1a1814;
}
.res-card.hero .res-card-value {
  color: var(--acc);
  transition: color .4s;
}

/* ── Messaggio stato ── */
.stato-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,.08);
  border-left: 3px solid var(--acc);
  padding: 1.1rem 1.4rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  transition: border-color .4s;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.stato-pill {
  background: var(--pill-bg);
  color: var(--pill-fg);
  font-family: 'Syne Mono', monospace;
  font-size: .52rem;
  letter-spacing: .25em;
  text-transform: uppercase;
  padding: .3rem .7rem;
  flex-shrink: 0;
  transition: background .4s;
}
#msg {
  font-size: .9rem;
  color: #5a5450;
  line-height: 1.5;
}

/* ── Footer ── */
footer {
  text-align: center;
  margin-top: 3.5rem;
  font-family: 'Syne Mono', monospace;
  font-size: .55rem;
  letter-spacing: .2em;
  color: rgba(26,24,20,.2);
  text-transform: uppercase;
}

/* ── Elemento tema nascosto ── */
#tema { display: none; }

</style>
</head>
<body>

<!-- tema hidden (aggiornato da LINE, osservato da body-class) -->
<span id="tema" hidden></span>

<header>
  <span class="logo">LINE-DOM</span>
  <h1>Bilancio Mensile</h1>
  <span class="header-badge">zero javascript</span>
</header>

<main>

  <!-- ── Entrate ── -->
  <span class="label">Entrate</span>
  <div class="card">
    <div class="field">
      <label class="field-label" for="entrata">Reddito mensile netto</label>
      <div class="input-wrap">
        <span class="input-prefix">€</span>
        <input id="entrata" type="number" min="0" step="1" placeholder="2500">
      </div>
    </div>
  </div>

  <!-- ── Uscite ── -->
  <span class="label">Uscite mensili</span>
  <div class="card">
    <div class="expense-grid">
      <div class="field">
        <label class="field-label" for="affitto">Affitto / mutuo</label>
        <div class="input-wrap">
          <span class="input-prefix">€</span>
          <input id="affitto" type="number" min="0" step="1" placeholder="0">
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="cibo">Spesa alimentare</label>
        <div class="input-wrap">
          <span class="input-prefix">€</span>
          <input id="cibo" type="number" min="0" step="1" placeholder="0">
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="trasporti">Trasporti</label>
        <div class="input-wrap">
          <span class="input-prefix">€</span>
          <input id="trasporti" type="number" min="0" step="1" placeholder="0">
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="bollette">Bollette / abbonamenti</label>
        <div class="input-wrap">
          <span class="input-prefix">€</span>
          <input id="bollette" type="number" min="0" step="1" placeholder="0">
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="svago">Svago / ristoranti</label>
        <div class="input-wrap">
          <span class="input-prefix">€</span>
          <input id="svago" type="number" min="0" step="1" placeholder="0">
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="altro">Altro</label>
        <div class="input-wrap">
          <span class="input-prefix">€</span>
          <input id="altro" type="number" min="0" step="1" placeholder="0">
        </div>
      </div>
    </div>
    <button id="calcola">Calcola bilancio →</button>
  </div>

  <!-- ── Risultati ── -->
  <span class="label">Riepilogo</span>

  <div class="results-grid">
    <div class="res-card">
      <span class="res-card-label">Totale uscite</span>
      <div class="res-card-value" id="tot-out">—</div>
    </div>
    <div class="res-card hero">
      <span class="res-card-label">Disponibile</span>
      <div class="res-card-value" id="rimasto">—</div>
    </div>
    <div class="res-card">
      <span class="res-card-label">% speso</span>
      <div class="res-card-value" id="perc-out">—</div>
    </div>
  </div>

  <div class="stato-card">
    <span class="stato-pill" id="stato-pill">Stato</span>
    <p id="msg">Inserisci i dati e premi "Calcola bilancio".</p>
  </div>

  <footer>Costruito con LINE-DOM · Nessuna riga di JavaScript</footer>

</main>

<!-- ══════════════════════════════════════
     LINE-DOM
══════════════════════════════════════ -->
<script src="https://qc-17.github.io/LINE/interpreter.js"></script>
<script src="https://qc-17.github.io/LINE/line-dom.js"></script>

<script type="text/line" trigger="calcola" replace body-class="tema">
  TAKE math

  >> Forzo conversione numerica: sottrarre 0 costringe LINE a trattare
  >> il valore stringa iniettato da LINE-DOM come numero
  #e  = @entrata - 0
  #a  = @affitto - 0
  #ci = @cibo - 0
  #tr = @trasporti - 0
  #bo = @bollette - 0
  #sv = @svago - 0
  #al = @altro - 0

  >> Calcolo le uscite totali e il disponibile
  #tot = #a + #ci + #tr + #bo + #sv + #al
  #rim = #e - #tot

  >> Percentuale: evito divisione per zero se entrata è 0
  #perc = 0
  IF ha-entrata = #e > 0
  GO @ha-entrata @{
    #perc = math_round(#tot * 100 / #e)
  }

  >> Scrivo i tre valori nei card
  <tot-out>TALK € @tot</tot-out>
  <rimasto>TALK € @rim</rimasto>
  <perc-out>TALK @perc%</perc-out>

  >> Funzioni per routing condizionale
  >> (i tag <id> non funzionano dentro @{...} inline)
  FUN budget_ok()
    <tema>TALK positivo</tema>
    <stato-pill>TALK In attivo</stato-pill>
    <msg>TALK Ottimo! Risparmi € @rim questo mese. Considera di investirli.</msg>
  FEND

  FUN budget_err()
    #ex = math_abs(#rim)
    <tema>TALK negativo</tema>
    <stato-pill>TALK In rosso</stato-pill>
    <msg>TALK Attenzione: le uscite superano le entrate di € @ex. Riduci le spese.</msg>
  FEND

  >> Applico lo stato corretto
  IF ok = #rim >= 0
  GO @ok @{ budget_ok() } && @{ budget_err() }

  >> Salvo in localStorage per la prossima visita
  <ls>ult_entrata = @entrata</ls>
  <ls>ult_tot = @tot</ls>
  <ls>ult_rim = @rim</ls>
</script>

</body>
</html>
